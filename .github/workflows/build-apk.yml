name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          # Install required SDK components
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" 2>&1 || echo "platforms-35 install skipped"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>&1 || echo "platforms-36 install skipped"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;36.0.0" 2>&1 || echo "build-tools install skipped"
          echo "--- SDK contents ---"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || true
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor native plugins
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
