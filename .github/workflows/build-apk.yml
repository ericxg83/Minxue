name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: List workspace
        run: ls -la && echo "---" && ls -la dist/ | head -5 && echo "---" && ls -la android/app/src/main/assets/ 2>/dev/null || echo "no assets dir"

      - name: Copy web assets to Android
        run: cp -r dist android/app/src/main/assets/public

      - name: Copy Capacitor config
        run: cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
