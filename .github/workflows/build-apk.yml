name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>&1 || echo "platforms install skipped"
          echo "--- SDK contents ---"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew --no-daemon assembleDebug > /tmp/gradle.log 2>&1 || true

      - name: Show Gradle output tail
        working-directory: android
        run: tail -200 /tmp/gradle.log

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
