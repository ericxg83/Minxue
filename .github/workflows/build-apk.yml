name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true

      - name: Debug Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          echo "--- SDK platforms ---"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms dir"
          echo "--- SDK build-tools ---"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools dir"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Check Java version
        run: java -version

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log
        continue-on-error: true

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
