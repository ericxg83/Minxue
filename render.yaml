services:
  - type: web
    name: minxue-api
    rootDir: server
    plan: free
    env: node
    nodeVersion: "22"
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEON_DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        value: https://api-inference.modelscope.cn/v1/chat/completions
      - key: AI_MODEL
        sync: false
      - key: MODELSCOPE_BACKUP_API_KEY
        sync: false
      # 备用 API：仅 TackleKey 一个厂商兜底（视觉/文本统一用 gemini-2.5-flash-nothink）
      # 已移除 Agnes / Sensnova / OpenRouter（不产 JSON 或免费额度不可用）。
      # 标 sync:false 留空，由代码按 Key 前缀自动路由 endpoint / 模型，勿硬编码。
      - key: TACKLEKEY_API_KEY
        sync: false
      - key: BACKUP_ENDPOINT
        sync: false
      - key: BACKUP_MODEL
        sync: false
      - key: BACKUP_VL_MODEL
        sync: false
      - key: OSS_REGION
        value: oss-cn-shanghai
      - key: OSS_BUCKET
        sync: false
      - key: OSS_ACCESS_KEY_ID
        sync: false
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_CDN_DOMAIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: TASK_TIMEOUT_MS
        value: 1800000
      - key: CONCURRENCY
        value: 2
      - key: ALLOWED_ORIGIN
        sync: false
