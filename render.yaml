services:
  - type: web
    name: minxue-api
    rootDir: server
    plan: free
    env: node
    nodeVersion: "22"
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEON_DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        value: https://api-inference.modelscope.cn/v1/chat/completions
      - key: AI_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: MODELSCOPE_BACKUP_API_KEY
        sync: false
      # 备用 API：按 BACKUP_API_KEY 前缀自动路由厂商（sk-iq→Sensnova / sk-or→OpenRouter / sk-m7→Agnes）
      # 以下三项留空，由代码按厂商自动注入 endpoint / 文本模型 / 视觉模型，勿在此硬编码，否则覆盖自动路由
      - key: BACKUP_API_KEY
        sync: false
      - key: BACKUP_ENDPOINT
        sync: false
      - key: BACKUP_MODEL
        sync: false
      - key: BACKUP_VL_MODEL
        sync: false
      - key: OSS_REGION
        value: oss-cn-shanghai
      - key: OSS_BUCKET
        sync: false
      - key: OSS_ACCESS_KEY_ID
        sync: false
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_CDN_DOMAIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: TASK_TIMEOUT_MS
        value: 1800000
      - key: CONCURRENCY
        value: 2
      - key: ALLOWED_ORIGIN
        sync: false
