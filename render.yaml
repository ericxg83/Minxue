services:
  - type: web
    name: minxue-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        value: https://api-inference.modelscope.cn/v1/chat/completions
      - key: AI_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: TASK_TIMEOUT_MS
        value: 1800000
      - key: CONCURRENCY
        value: 2
      - key: ALLOWED_ORIGIN
        sync: false
