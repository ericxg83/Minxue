services:
  - type: web
    name: minxue-api
    rootDir: server
    plan: free
    env: node
    nodeVersion: "22"
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEON_DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        value: https://api-inference.modelscope.cn/v1/chat/completions
      - key: AI_MODEL
        sync: false
      - key: MODELSCOPE_BACKUP_API_KEY
        sync: false
      # 备用 API（多厂商，各自独立 Key，按优先级 Sensnova → Agnes → OpenRouter）
      # 视觉兜底链：首选 Sensnova（付费额度），其次 Agnes（免费，实测可视觉）。
      # 以下变量均标 sync:false 留空，由代码按 Key 前缀自动路由厂商 / endpoint / 模型，
      # 勿在此硬编码，否则覆盖自动路由逻辑。
      - key: SENSNOVA_API_KEY
        sync: false
      - key: AGNES_API_KEY
        sync: false
      - key: BACKUP_API_KEY
        sync: false
      - key: BACKUP_ENDPOINT
        sync: false
      - key: BACKUP_MODEL
        sync: false
      - key: BACKUP_VL_MODEL
        sync: false
      - key: OSS_REGION
        value: oss-cn-shanghai
      - key: OSS_BUCKET
        sync: false
      - key: OSS_ACCESS_KEY_ID
        sync: false
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_CDN_DOMAIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: TASK_TIMEOUT_MS
        value: 1800000
      - key: CONCURRENCY
        value: 2
      - key: ALLOWED_ORIGIN
        sync: false
