services:
  - type: web
    name: minxue-api
    rootDir: server
    plan: free
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEON_DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        value: https://api-inference.modelscope.cn/v1/chat/completions
      - key: AI_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: OSS_REGION
        value: oss-cn-shanghai
      - key: OSS_BUCKET
        sync: false
      - key: OSS_ACCESS_KEY_ID
        sync: false
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_CDN_DOMAIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: TASK_TIMEOUT_MS
        value: 1800000
      - key: CONCURRENCY
        value: 2
      - key: ALLOWED_ORIGIN
        sync: false
